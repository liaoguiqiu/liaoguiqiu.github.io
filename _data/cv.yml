cv:
  name: Guiqiu Liao
  headline: Postdoctoral Researcher
  location: Philadelphia, PA, USA

  social_networks:
    - network: GitHub
      username: liaoguiqiu

  sections:
    Summary:
      - bullet: Researcher at the University of Pennsylvania working on AI for surgery, surgical robotics, and medical imaging.
      - bullet: Former Marie Sklodowska-Curie doctoral fellow in the ATLAS project spanning the University of Strasbourg and the University of Verona.

    Education:
      - institution: University of Strasbourg and University of Verona
        area: Informatics Science and Computer Science
        degree: Double PhD
        location: Strasbourg, France and Verona, Italy
        start_date: 2019-10
        end_date: 2023-01
        highlights:
          - Marie Sklodowska-Curie Fellowship.
          - Thesis: Analysis and correction of OCT images for the control of robotic flexible endoscopes.
          - Supervisors: Michalina J. Gora and Diego D'Allaba.
          - Directors: Michel de Mathelin and Paolo Fiorini.

      - institution: Shanghai Jiao Tong University
        area: Instrument Science and Technology
        degree: Master
        location: Shanghai, China
        start_date: 2016-09
        end_date: 2019-03
        highlights:
          - GPA: 3.48/4.0.
          - Thesis: Research on Reliability Enhancement for Navigation and Control System of Rotor-craft.
          - Adviser: Jiankang Zhao.

      - institution: Chongqing University
        area: Measurement and Control Science and Technology
        degree: Bachelor
        location: Chongqing, China
        start_date: 2012-09
        end_date: 2016-06
        highlights:
          - CGPA: 3.57/4.0.
          - Integrated ranking: 3/107.
          - Dissertation: Autonomous Navigation and Precise Positioning for Quadcopter Helicopter.

    Experience:
      - company: Penn Medicine, University of Pennsylvania
        position: Postdoctoral Researcher
        location: Philadelphia, PA, USA
        start_date: 2023-12
        summary: Developing data-driven AI for surgery.
        highlights:
          - Mentors: Daniel A. Hashimoto, Eric Eaton, and Kostas Daniilidis.

      - company: ICUBE Laboratory, University of Strasbourg
        position: Researcher
        location: Strasbourg, France
        start_date: 2019-10
        end_date: 2023-01
        summary: Worked on catheterized and robotized optical coherence tomography for surgical endoscopy.
        highlights:
          - Developed automatic OCT control for the colon with a robotic surgical endoscope.
          - Led system integration, research coordination, and master student supervision.

      - company: ALTAIR Laboratory, University of Verona
        position: Researcher
        location: Verona, Italy
        start_date: 2021-01
        end_date: 2021-10
        summary: Worked on catheter image segmentation and privacy-preserving learning for OCT and IVUS.
        highlights:
          - Developed a privacy-preserving federated learning pipeline for multi-institution imaging.

      - company: Eastimage Equipment Co., Ltd.
        position: Computer Vision Algorithm Engineer Intern
        location: Shanghai, China
        start_date: 2019-04
        end_date: 2019-08
        summary: Developed deep-learning-based visual inspection algorithms for X-ray imaging.

    Teaching:
      - bullet: Biomedical Optics course, 2 lectures per year, master's level.
      - bullet: Instrumentation Technique for Health, 2 lectures per year, master's level.
      - bullet: Supervised the 2022 master's thesis of Tania Olmo Fajardo on automatic scanning of robotic endoscopic OCT.

    Service:
      - bullet: Reviewer for IEEE Transactions on Robotics, ICAR, and Journal of Navigation.
      - bullet: Co-organized the ATLAS training activity Medical Device Development and Translation for 20 PhD students from 7 universities.
      - bullet: Helped organize the Spring 2024 GRASP on Robotics seminar featuring Pietro Valdastri.
      - bullet: Member of IEEE and SPIE.

    Skills:
      - label: Research areas
        details: Machine learning, computer vision, AI for surgery, surgical robotics, medical imaging, optical coherence tomography
      - label: Technical skills
        details: Python, PyTorch, TensorFlow, C++, C, Matlab, ROS, Linux, LabVIEW, SolidWorks, fiber-optic catheter manufacturing
      - label: Methods
        details: Mapping and localization, sensor fusion, state estimation, feedback control, optimization, system identification

    Languages:
      - label: Chinese
        details: Fluent
      - label: English
        details: Fluent
      - label: Italian
        details: Entry-level
      - label: French
        details: Entry-level
